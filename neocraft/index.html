<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Neo Craft — Voxel World</title>
<meta name="description" content="Neo Craft: a neon-lit voxel sandbox you can build and explore, right in the browser.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%230a0e1a%22/><rect x=%2225%22 y=%2225%22 width=%2222%22 height=%2222%22 fill=%22%2300f0ff%22/><rect x=%2253%22 y=%2253%22 width=%2222%22 height=%2222%22 fill=%22%23b026ff%22/></svg>">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="gameCanvas"></canvas>

  <div id="titleScreen">
    <div class="titleGlow"></div>
    <div class="titleWrap">
      <h1 class="logo">NEO<span>CRAFT</span></h1>
      <p class="subtitle">A Neon Voxel Universe</p>
      
      <div id="engineError" class="errorBox hidden"></div>

      <div class="menuCard">
        <div class="inputGroup">
          <label for="worldSeed">ENTER WORLD SEED</label>
          <input type="text" id="worldSeed" placeholder="Leave empty for random..." maxlength="32" autocomplete="off">
        </div>
        <button id="newWorldBtn" class="btn btnPrimary">NEW WORLD</button>
        <button id="continueBtn" class="btn btnSecondary hidden">CONTINUE GAME</button>
      </div>

      <div class="credits">Built with Three.js • Mobile Optimized</div>
    </div>
  </div>

  <div id="hud" class="hidden">
    <div class="crosshair"></div>
    
    <div id="topBar">
      <div class="statsGroup">
        <span id="fpsDisplay">-- FPS</span>
        <span id="posDisplay">X: 0, Y: 0, Z: 0</span>
      </div>
      <button id="menuBtn" class="iconBtn">☰</button>
    </div>

    <div id="hotbarWrap">
      <div id="hotbar">
        </div>
    </div>
  </div>

  <div id="touchControls" class="hidden">
    <div id="dpad">
      <button id="btnForward" class="dpadBtn">▲</button>
      <div class="dpadRow">
        <button id="btnLeft" class="dpadBtn">◀</button>
        <div class="dpadCenter"></div>
        <button id="btnRight" class="dpadBtn">▶</button>
      </div>
      <button id="btnBackward" class="dpadBtn">▼</button>
    </div>

    <button id="jumpBtn" class="touchBtnCircle">⤊</button>
    <button id="breakBtn" class="touchBtnCircle touchBtnAction">DIG</button>
    <button id="placeBtn" class="touchBtnCircle touchBtnAction">PLACE</button>
  </div>

  <div id="pauseMenu" class="hidden">
    <div class="menuCard">
      <h2>PAUSED</h2>
      <button id="resumeBtn" class="btn btnPrimary">RESUME</button>
      <button id="saveBtn" class="btn btnSecondary">SAVE WORLD</button>
      <button id="quitBtn" class="btn btnDanger">QUIT TO MENU</button>
    </div>
  </div>

  <div id="toast"></div>

  <script src="three.min.js"></script>
  <script src="noise.js"></script>
  <script src="main.js"></script>
</body>
</html>
